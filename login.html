<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRONLOG — Sign in</title>
<link rel="stylesheet" href="styles.css">
<style>
  body{
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,87,34,0.10), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(212,255,77,0.06), transparent 40%),
      var(--bg);
  }
  .auth-wrap{ width:100%; max-width:380px; padding:20px; }
  .auth-brand{ display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:28px; }
  .auth-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:32px 28px 26px;
  }
  .auth-title{ font-family:var(--font-display); font-size:24px; text-transform:uppercase; text-align:center; }
  .auth-sub{ text-align:center; color:var(--text-dim); font-size:13px; margin-top:6px; margin-bottom:26px; }
  .role-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:22px; }
  .role-opt{
    border:1px solid var(--border); border-radius:8px; padding:10px 4px;
    text-align:center; font-size:11.5px; font-weight:600; color:var(--text-dim);
    background:var(--surface-2); transition:all .15s;
  }
  .role-opt.selected{ border-color:var(--orange); color:var(--orange); background:var(--orange-dim); }
  .auth-foot{ text-align:center; margin-top:18px; font-size:12.5px; color:var(--text-dim); }
  .auth-foot a{ color:var(--orange); font-weight:600; cursor:pointer; }
  .auth-foot a:hover{ text-decoration:underline; }
  .hidden{ display:none; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-brand">
    <div class="brand-mark" style="width:34px;height:34px;"></div>
    <div class="brand-name" style="font-size:23px;">IRON<span>LOG</span></div>
  </div>

  <div class="tape" style="margin-bottom:24px; border-radius:4px;"></div>

  <div class="auth-card">

    <!-- SIGN IN PANEL -->
    <div id="signinPanel">
      <div class="auth-title">Sign in</div>
      <div class="auth-sub">Enter your member, trainer, or admin credentials</div>

      <div class="role-grid" id="roleGrid">
        <div class="role-opt selected" data-role="member.html">Member</div>
        <div class="role-opt" data-role="trainer.html">Trainer</div>
        <div class="role-opt" data-role="admin.html">Admin</div>
      </div>

      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@ironlog.gym" required>
        </div>
        <div class="field" style="margin-bottom:22px;">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" id="loginBtn" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">Sign in</button>
      </form>

      <div class="auth-foot">No account? <a id="showRegister">Register a membership</a></div>
    </div>

    <!-- REGISTER PANEL -->
    <div id="registerPanel" class="hidden">
      <div class="auth-title">Register</div>
      <div class="auth-sub">New members start here — trainer and admin accounts are created by gym staff</div>

      <form id="registerForm">
        <div class="field">
          <label>Full name</label>
          <input type="text" id="regName" placeholder="Priya Venkat" required>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@ironlog.gym" required>
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="regPhone" placeholder="98765 43210">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="••••••••" minlength="6" required>
        </div>
        <div class="field" style="margin-bottom:22px;">
          <label>Branch</label>
          <select id="regBranch">
            <option value="">Select a branch</option>
            <option value="1">T. Nagar — Main</option>
            <option value="2">OMR — Annex</option>
            <option value="3">Velachery</option>
          </select>
        </div>
        <button type="submit" id="registerBtn" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">Create account</button>
      </form>

      <div class="auth-foot">Already have an account? <a id="showSignin">Sign in</a></div>
    </div>

  </div>


<script>
  const API = 'http://localhost:4000/api';

  // ---- helpers ----
  function showError(formId, msg) {
    let el = document.getElementById(formId + '_err');
    if (!el) {
      el = document.createElement('div');
      el.id = formId + '_err';
      el.style.cssText = 'background:rgba(255,77,77,0.12);color:#FF4D4D;border:1px solid rgba(255,77,77,0.3);border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:14px;';
      document.getElementById(formId).prepend(el);
    }
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError(formId) {
    const el = document.getElementById(formId + '_err');
    if (el) el.style.display = 'none';
  }
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
  }

  // ---- Sign in <-> Register toggle ----
  const signinPanel = document.getElementById('signinPanel');
  const registerPanel = document.getElementById('registerPanel');

  document.getElementById('showRegister').addEventListener('click', ()=>{
    signinPanel.classList.add('hidden');
    registerPanel.classList.remove('hidden');
  });
  document.getElementById('showSignin').addEventListener('click', ()=>{
    registerPanel.classList.add('hidden');
    signinPanel.classList.remove('hidden');
  });

  // ---- Role selector (sign in) ----
  document.querySelectorAll('.role-opt').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.querySelectorAll('.role-opt').forEach(o=>o.classList.remove('selected'));
      el.classList.add('selected');
    });
  });

  // store label on buttons for loading reset
  document.getElementById('loginBtn').dataset.label   = 'Sign in';
  document.getElementById('registerBtn').dataset.label = 'Create account';

  // ---- SIGN IN ----
  document.getElementById('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    hideError('loginForm');
    setLoading('loginBtn', true);

    const email    = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showError('loginForm', data.error || 'Login failed');
        return;
      }

      // Save token and user info for dashboards to use
      localStorage.setItem('ironlog_token', data.token);
      localStorage.setItem('ironlog_user',  JSON.stringify(data.user));

      // Route by role returned from API (not the picker)
      const roleMap = { admin: 'admin.html', trainer: 'trainer.html', member: 'member.html' };
      window.location.href = roleMap[data.user.role] || 'member.html';

    } catch {
      showError('loginForm', 'Cannot reach the server — make sure the API is running on port 4000');
    } finally {
      setLoading('loginBtn', false);
    }
  });

  // ---- REGISTER ----
  document.getElementById('registerForm').addEventListener('submit', async e=>{
    e.preventDefault();
    hideError('registerForm');
    setLoading('registerBtn', true);

    const payload = {
      name:      document.getElementById('regName').value.trim(),
      email:     document.getElementById('regEmail').value.trim(),
      phone:     document.getElementById('regPhone').value.trim() || null,
      password:  document.getElementById('regPassword').value,
      branch_id: document.getElementById('regBranch').value || null
    };

    try {
      const res  = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (!res.ok) {
        showError('registerForm', data.error || 'Registration failed');
        return;
      }

      localStorage.setItem('ironlog_token', data.token);
      localStorage.setItem('ironlog_user',  JSON.stringify(data.user));

      // New registrations are always members
      window.location.href = 'member.html';

    } catch {
      showError('registerForm', 'Cannot reach the server — make sure the API is running on port 4000');
    } finally {
      setLoading('registerBtn', false);
    }
  });
</script>
</body>
</html>
