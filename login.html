<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRONLOG — Sign in</title>
<link rel="stylesheet" href="styles.css">
<style>
  body{
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,87,34,0.10), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(212,255,77,0.06), transparent 40%),
      var(--bg);
  }
  .auth-wrap{ width:100%; max-width:380px; padding:20px; }
  .auth-brand{ display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:28px; }
  .auth-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:32px 28px 26px;
  }
  .auth-title{ font-family:var(--font-display); font-size:24px; text-transform:uppercase; text-align:center; }
  .auth-sub{ text-align:center; color:var(--text-dim); font-size:13px; margin-top:6px; margin-bottom:26px; }
  .role-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:22px; }
  .role-opt{
    border:1px solid var(--border); border-radius:8px; padding:10px 4px;
    text-align:center; font-size:11.5px; font-weight:600; color:var(--text-dim);
    background:var(--surface-2); transition:all .15s;
  }
  .role-opt.selected{ border-color:var(--orange); color:var(--orange); background:var(--orange-dim); }
  .auth-foot{ text-align:center; margin-top:18px; font-size:12.5px; color:var(--text-dim); }
  .auth-foot a{ color:var(--orange); font-weight:600; cursor:pointer; }
  .auth-foot a:hover{ text-decoration:underline; }
  .hidden{ display:none; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-brand">
    <div class="brand-mark" style="width:34px;height:34px;"></div>
    <div class="brand-name" style="font-size:23px;">IRON<span>LOG</span></div>
  </div>

  <div class="tape" style="margin-bottom:24px; border-radius:4px;"></div>

  <div class="auth-card">

    <!-- SIGN IN PANEL -->
    <div id="signinPanel">
      <div class="auth-title">Sign in</div>
      <div class="auth-sub">Enter your member, trainer, or admin credentials</div>

      <div class="role-grid" id="roleGrid">
        <div class="role-opt selected" data-role="member.html">Member</div>
        <div class="role-opt" data-role="trainer.html">Trainer</div>
        <div class="role-opt" data-role="admin.html">Admin</div>
      </div>

      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="you@ironlog.gym" required>
        </div>
        <div class="field" style="margin-bottom:22px;">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">Sign in</button>
      </form>

      <div class="auth-foot">No account? <a id="showRegister">Register a membership</a></div>
    </div>

    <!-- REGISTER PANEL -->
    <div id="registerPanel" class="hidden">
      <div class="auth-title">Register</div>
      <div class="auth-sub">New members start here — trainer and admin accounts are created by gym staff</div>

      <form id="registerForm">
        <div class="field">
          <label>Full name</label>
          <input type="text" id="regName" placeholder="Priya Venkat" required>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@ironlog.gym" required>
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="regPhone" placeholder="98765 43210">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="••••••••" minlength="6" required>
        </div>
        <div class="field" style="margin-bottom:22px;">
          <label>Branch</label>
          <select id="regBranch">
            <option value="">Select a branch</option>
            <option value="1">T. Nagar — Main</option>
            <option value="2">OMR — Annex</option>
            <option value="3">Velachery</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">Create account</button>
      </form>

      <div class="auth-foot">Already have an account? <a id="showSignin">Sign in</a></div>
    </div>

  </div>


<script>
  
  const signinPanel = document.getElementById('signinPanel');
  const registerPanel = document.getElementById('registerPanel');

  document.getElementById('showRegister').addEventListener('click', ()=>{
    signinPanel.classList.add('hidden');
    registerPanel.classList.remove('hidden');
  });
  document.getElementById('showSignin').addEventListener('click', ()=>{
    registerPanel.classList.add('hidden');
    signinPanel.classList.remove('hidden');
  });

 
  let selectedRole = 'member.html';
  document.querySelectorAll('.role-opt').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.querySelectorAll('.role-opt').forEach(o=>o.classList.remove('selected'));
      el.classList.add('selected');
      selectedRole = el.dataset.role;
    });
  });

  document.getElementById('loginForm').addEventListener('submit', e=>{
    e.preventDefault();
    window.location.href = selectedRole;
  });

  document.getElementById('registerForm').addEventListener('submit', e=>{
    e.preventDefault();
    const payload = {
      name: document.getElementById('regName').value,
      email: document.getElementById('regEmail').value,
      phone: document.getElementById('regPhone').value,
      password: document.getElementById('regPassword').value,
      branch_id: document.getElementById('regBranch').value || null
    };
    console.log('Register payload', payload);
    window.location.href = 'member.html';
  });
</script>
</body>
</html>
