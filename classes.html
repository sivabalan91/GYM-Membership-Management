<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRONLOG — Book a Class</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="classes.css">
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">IRON<span>LOG</span></div>
    </div>
    <div class="role-tag"><span class="role-dot"></span>Member Area</div>
    <nav class="nav">
      <div class="nav-section-label">Overview</div>
      <a class="nav-item" href="member.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Dashboard
      </a>
      <div class="nav-section-label">Train</div>
      <a class="nav-item active" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Book a Class
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18v4h12v-4"/><rect x="6" y="9" width="12" height="9" rx="1"/></svg>
        Workout Plan
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Nutrition Plan
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
        Progress
      </a>
      <div class="nav-section-label">Account</div>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Billing &amp; Plan
      </a>
      <a class="nav-item" href="login.html" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </nav>
    <div class="sidebar-foot">
      <div class="avatar" id="userInitials">--</div>
      <div>
        <div class="sidebar-foot-name" id="userName">Loading…</div>
        <div class="sidebar-foot-sub">Member</div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div>
        <div class="page-title">Book a Class</div>
        <div class="page-sub" id="pageDate">Browse and reserve your next session</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" onclick="loadMyBookings()">My bookings</button>
        <button class="btn btn-primary btn-sm" onclick="loadClasses()">Refresh</button>
      </div>
    </header>

    <div class="content">

      <!-- Filter bar -->
      <div class="filter-bar">
        <input type="date" id="filterDate" title="Filter by date">
        <select id="filterBranch">
          <option value="">All branches</option>
          <option value="1">T. Nagar — Main</option>
          <option value="2">OMR — Annex</option>
          <option value="3">Velachery</option>
        </select>
        <input type="text" id="filterSearch" placeholder="Search class name…" style="flex:1; min-width:160px;">
        <button class="btn btn-sm" onclick="loadClasses()">Apply</button>
      </div>

      <!-- Classes grid -->
      <div class="grid-2" style="gap:20px; align-items:start;">

        <div>
          <div class="panel-head" style="margin-bottom:14px;">
            <div class="panel-title">Available Classes</div>
            <span class="pill pill-grey" id="classCount">— classes</span>
          </div>
          <div class="classes-grid" id="classesGrid">
            <!-- skeleton loaders -->
            <div class="class-card" style="padding:18px; gap:10px;">
              <div class="skeleton" style="width:60%; height:12px;"></div>
              <div class="skeleton" style="width:80%; height:20px;"></div>
              <div class="skeleton" style="width:50%; height:12px;"></div>
            </div>
            <div class="class-card" style="padding:18px; gap:10px;">
              <div class="skeleton" style="width:60%; height:12px;"></div>
              <div class="skeleton" style="width:80%; height:20px;"></div>
              <div class="skeleton" style="width:50%; height:12px;"></div>
            </div>
          </div>
        </div>

        <!-- My Bookings panel -->
        <div class="panel" style="position:sticky; top:20px;">
          <div class="panel-head">
            <div class="panel-title">My Bookings</div>
            <span class="pill pill-grey" id="bookingCount">0</span>
          </div>
          <div id="myBookingsList">
            <div class="empty">
              <div class="empty-icon">📅</div>
              Loading your bookings…
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toastMsg"></span>
</div>
<script src="classes.js"></script>
</body>
</html>
